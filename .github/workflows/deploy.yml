name: Build & Deploy

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: geminiwen/cc-kanban

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: geminiwen.com
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            mkdir -p /data/kanban
            cd /data/kanban

            cat > docker-compose.yml << 'COMPOSE'
            services:
              app:
                image: ghcr.io/geminiwen/cc-kanban:latest
                ports:
                  - "3100:3000"
                  - "3101:3001"
                environment:
                  DATABASE_URL: "${{ secrets.DATABASE_URL }}"
                  WS_PORT: "3001"
                restart: unless-stopped
            COMPOSE

            echo ${{ secrets.GHCR_TOKEN }} | docker login ghcr.io -u geminiwen --password-stdin
            docker compose pull app
            docker compose up -d
